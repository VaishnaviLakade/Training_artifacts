services:
  backend:
    build: ./backend
    container_name: mealconnect_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/mealconnect
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: mealconnect_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: mealconnect_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
